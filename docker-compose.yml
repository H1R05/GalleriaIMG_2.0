version: '3.8'

services:
  # DATABASE
  mongodb:
    image: mongo:latest
    container_name: database_mongo
    ports:
      - "27017:27017"
    volumes:
      # salvare i dati del DB sul disco per non perderli ai riavvii
      - dati_mongo:/data/db

  # SERVER API
  server_principale:
    build: ./Server_API
    container_name: api_centrale
    ports:
      - "5000:5000"
    depends_on:
      #accende prima il DB, poi il server Python
      - mongodb
    environment:
      - SECRET_KEY=${MY_APP_SECRET_KEY}
      - MONGO_URI=${MY_MONGO_URI}

volumes:
  dati_mongo:
